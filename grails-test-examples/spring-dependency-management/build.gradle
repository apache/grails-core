// This Grails application is regression coverage that dependency versions come from
// grails-bom through Gradle's native platform() support. That keeps Grails-managed
// dependencies such as SiteMesh aligned with the published Grails BOM instead of
// Spring Boot's dependency metadata.
plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
}

version = '0.1'
group = 'functionaltests'

apply plugin: 'org.apache.grails.gradle.grails-web'
apply plugin: 'org.apache.grails.gradle.grails-gsp'

dependencies {
    implementation platform(project(':grails-bom'))

    implementation 'org.apache.grails:grails-dependencies-starter-web'
    implementation 'org.apache.grails:grails-data-hibernate5'
    implementation 'org.apache.grails:grails-layout'

    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'org.apache.tomcat:tomcat-jdbc'

    testImplementation 'org.apache.grails:grails-testing-support-web'

    integrationTestImplementation 'org.apache.grails:grails-testing-support-http-client'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
}
