---
grails:
    profile: web
    codegen:
        defaultPackage: micronaut.hibernate7
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
app:
    name: test-micronaut-hibernate7-app

---
grails:
    mime:
        types:
            all: '*/*'
            html:
              - text/html
              - application/xhtml+xml
            json:
              - application/json
              - text/json
            xml:
              - text/xml
              - application/xml
    views:
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                scriptlet: html
---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.h2.Driver
    username: sa
    password: ''

environments:
    development:
        dataSource:
            dbCreate: create-drop
            url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    test:
        dataSource:
            dbCreate: update
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    production:
        dataSource:
            dbCreate: none
            url: jdbc:h2:./prodDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
