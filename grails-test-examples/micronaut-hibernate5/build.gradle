plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.dependency-validator'
}

version = '0.1'
group = 'micronaut.hibernate5'

// The Micronaut platform ships org.ow2.asm above what the grails-hibernate5-micronaut-bom pins; allow
// the intentional platform override so validateDependencyVersions passes (apache/grails-core#15677).
ext.allowedBomOverrides = ['org.ow2.asm:asm', 'org.ow2.asm:asm-util']

apply plugin: 'org.apache.grails.gradle.grails-web'
apply plugin: 'cloud.wondrify.asset-pipeline'
apply plugin: 'org.apache.grails.gradle.grails-gsp'

dependencies {
    implementation enforcedPlatform(project(':grails-hibernate5-micronaut-bom'))

    implementation 'io.micronaut:micronaut-http-client'
    implementation 'io.micronaut.serde:micronaut-serde-jackson'
    implementation 'org.apache.grails:grails-dependencies-starter-web'
    implementation 'org.apache.grails:grails-data-hibernate5'
    implementation 'org.apache.grails:grails-micronaut'

    annotationProcessor enforcedPlatform(project(':grails-hibernate5-micronaut-bom'))
    annotationProcessor 'io.micronaut:micronaut-inject-java'
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'

    testAndDevelopmentOnly enforcedPlatform(project(':grails-hibernate5-micronaut-bom'))
    testAndDevelopmentOnly 'org.apache.grails:grails-dependencies-assets'

    runtimeOnly 'cloud.wondrify:asset-pipeline-grails'
    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'org.apache.tomcat:tomcat-jdbc'

    testImplementation 'org.apache.grails:grails-dependencies-test'

    integrationTestImplementation testFixtures('org.apache.grails:grails-geb')
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-webjar-asset-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
}
