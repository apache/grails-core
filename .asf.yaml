github:
  # deployment environments to delay releasing until the necessary steps have completed
  environments:
    close:
      required_reviewers:
        - id: jdaugherty
          type: User
        - id: matrei
          type: User
        - id: jamesfredley
          type: User
        - id: sbglasius
          type: User
      wait_timer: 0
    docs:
      required_reviewers:
        - id: jdaugherty
          type: User
        - id: matrei
          type: User
        - id: jamesfredley
          type: User
        - id: sbglasius
          type: User
      wait_timer: 0
    sdkman:
      required_reviewers:
        - id: jdaugherty
          type: User
        - id: matrei
          type: User
        - id: jamesfredley
          type: User
        - id: sbglasius
          type: User
      wait_timer: 0
    release:
      required_reviewers:
        - id: jdaugherty
          type: User
        - id: matrei
          type: User
        - id: jamesfredley
          type: User
        - id: sbglasius
          type: User
      wait_timer: 0
  description: "Grails - the Web Application Framework"
  homepage: https://grails.apache.org/
notifications:
  # GitHub related
  commits: commits@grails.apache.org
