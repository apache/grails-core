plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
    id 'org.apache.grails.gradle.grails-code-style'
    id 'org.apache.grails.gradle.grails-gsp'
    id 'org.apache.grails.gradle.grails-plugin'
}

version = projectVersion
group = 'org.apache.grails'

dependencies {

    implementation platform(project(':grails-bom'))

    implementation 'org.springframework.boot:spring-boot-starter-logging'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    implementation project(':grails-core')
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-tomcat'
    implementation project(':grails-web-boot')
    implementation project(':grails-logging')
    implementation project(':grails-rest-transforms')
    implementation project(':grails-databinding')
    implementation project(':grails-services')
    implementation project(':grails-url-mappings')
    implementation project(':grails-interceptors')
    implementation project(':grails-gsp')
    implementation project(':grails-layout')
    console project(':grails-console')
    profile project(':grails-profiles-web-plugin')
    runtimeOnly project(':grails-services')
    runtimeOnly project(':grails-domain-class')
    testImplementation project(':grails-testing-support-datamapping')
    testImplementation project(':grails-testing-support-web')

    implementation 'org.ehcache:ehcache', {
        capabilities {
            requireCapability('org.ehcache:ehcache-jakarta')
        }
    }

    api project(':grails-spring-security')
    api 'org.springframework.security:spring-security-acl'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/spring-security-test-config.gradle')
}
