plugins {
	id 'groovy'
	id 'java-library'
	id 'project-report'
	id 'org.apache.grails.buildsrc.properties'
	id 'org.apache.grails.buildsrc.dependency-validator'
	id 'org.apache.grails.buildsrc.compile'
	id 'org.apache.grails.buildsrc.publish'
	id 'org.apache.grails.buildsrc.sbom'
	id 'org.apache.grails.gradle.grails-code-style'
	id 'org.apache.grails.gradle.grails-plugin'
}

version = projectVersion
group = 'org.apache.grails'

dependencies {

	implementation platform(project(':grails-bom'))

	compileOnly 'jakarta.servlet:jakarta.servlet-api'
	compileOnly 'org.springframework.boot:spring-boot-starter-logging'
	compileOnly project(':grails-web-boot')

	profile project(':grails-profiles-web-plugin')
	api project(':grails-spring-security-core')

	api 'org.apereo.cas.client:cas-client-core'
	api 'org.springframework.security:spring-security-cas', {
		['spring-beans', 'spring-context', 'spring-core', 'spring-security-core',
		 'spring-security-web', 'spring-web'].each { exclude module: it }
	}
}

apply {
	from rootProject.layout.projectDirectory.file('gradle/groovydoc-config.gradle')
	from rootProject.layout.projectDirectory.file('gradle/spring-security-test-config.gradle')
}
