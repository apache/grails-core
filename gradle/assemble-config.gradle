tasks.register('installToHomeDist').configure { Task task ->
    task.inputs.files(tasks.named('jar').map { jar -> jar.outputs.files })
    task.inputs.files(tasks.named('sourcesJar').map { jar -> jar.outputs.files })
    task.inputs.files(tasks.named('javadocJar').map { jar -> jar.outputs.files })
    task.outputs.dir(distInstallDir)

    doLast {
        copy {
            it.from layout.buildDirectory.dir('libs')
            it.into distInstallDir
        }
    }
}

tasks.withType(PublishToMavenLocal).configureEach {
    it.dependsOn('installToHomeDist')
    it.doLast {
        copy {
            from distInstallDir
            into homeDistDir
            includeEmptyDirs = false
        }
    }
}