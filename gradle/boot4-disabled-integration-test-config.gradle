// integrationTest is disabled for modules applying this file.
// Blocker: Groovy 5 + indy=false drops the scope of controller action parameters/locals
// after ControllerActionTransformer re-parents the body inside a TryCatchStatement, so they
// resolve to propertyMissing on the controller and throw MissingPropertyException. Re-running
// VariableScopeVisitor does not rebind them; this needs an upstream Groovy fix. indy=true passes.
// Reproducer: https://github.com/jamesfredley/groovy5-controller-action-param-scope-bug
// Re-enable once the upstream fix lands.

tasks.named('integrationTest') {
    enabled = false
}
