plugins {
    id 'groovy'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
}

apply plugin: 'org.apache.grails.gradle.grails-web'

version = projectVersion
group = 'org.apache.grails.testing'

dependencies {
    // Core dependencies for profile testing
    implementation project(':grails-core')
    implementation project(':grails-bootstrap')
    
    // Testing dependencies
    testImplementation project(':grails-test-core')
    testImplementation project(':grails-testing-support-core')
    
    // Spock testing framework
    testImplementation 'org.spockframework:spock-core'
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
    
    // JUnit platform
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    
    // Logging for tests
    testImplementation 'org.slf4j:slf4j-simple'
    
    // Geb testing support
    testImplementation testFixtures(project(':grails-geb'))
}

// Configure test tasks manually to avoid circular dependencies
tasks.withType(Test).configureEach {
    useJUnitPlatform()
    
    // Include only profile test classes
    include '**/*Profile*Test*'
    include '**/*Profile*Spec*'
    
    // Test reporting configuration
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
        showStandardStreams = true
    }
    
    // Make Geb tests more resilient in CI environments
    systemProperty('grails.geb.atCheckWaiting.enabled', 'true')
    systemProperty('grails.geb.recording.mode', 'RECORD_ALL')
    
    doLast {
        // Delete old recording directories to save space
        def baseDir = file(System.getProperty('grails.geb.recording.directory', 'build/gebContainer/recordings'))
        if (!baseDir.isDirectory()) return
        def dirs = (baseDir.listFiles() ?: [])
                .findAll { it.directory && it.name ==~ /^\d{8}_\d{6}$/ }
                .sort { it.name }
        if (dirs.size() > 2) {
            delete(dirs.dropRight(2)) // keep the two most recent
        }
    }
}

// Custom task to run profile tests with specific configurations
tasks.register('profileTest', Test) {
    include '**/*Profile*Test*'
    include '**/*Profile*Spec*'
}

// Task to run functional profile tests separately
tasks.register('functionalProfileTest', Test) {
    include '**/*Functional*Profile*Test*'
    include '**/*Functional*Profile*Spec*'
}