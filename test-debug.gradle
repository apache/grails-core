gradle.projectsEvaluated {
    def root = gradle.rootProject
    def selectedPaths = root.hasProperty('grails.test.modules') ? root.property('grails.test.modules').toString().split(',').collect { it.trim() } : []
    println "Selected Paths: " + selectedPaths
    
    root.allprojects { sub ->
        boolean isSelected = selectedPaths.contains(sub.path)
        println "Project ${sub.path} isSelected=${isSelected}"
    }
}