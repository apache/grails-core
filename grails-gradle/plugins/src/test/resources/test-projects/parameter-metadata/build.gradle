plugins {
    id 'org.apache.grails.gradle.grails-app'
}

tasks.register('inspectParameterMetadata') {
    doLast {
        def groovyCompile = tasks.named('compileGroovy', org.gradle.api.tasks.compile.GroovyCompile).get()
        def javaCompile = tasks.named('compileJava', org.gradle.api.tasks.compile.JavaCompile).get()
        println "GROOVY_PARAMETERS=${groovyCompile.groovyOptions.parameters}"
        println "JAVA_PARAMETERS=${javaCompile.options.compilerArgs.contains('-parameters')}"
    }
}
