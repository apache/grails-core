configurations.register('documentation') {
    canBeConsumed = false
    canBeResolved = true
    attributes {
        attribute(Category.CATEGORY_ATTRIBUTE, objects.named(Category, Category.LIBRARY))
        attribute(Bundling.BUNDLING_ATTRIBUTE, objects.named(Bundling, Bundling.EXTERNAL))
        attribute(Usage.USAGE_ATTRIBUTE, objects.named(Usage, Usage.JAVA_RUNTIME))
    }
}
dependencies {
    add('documentation', platform(project(':grails-gradle-bom')))
    add('documentation', 'org.fusesource.jansi:jansi')
    add('documentation', 'jline:jline')
    add('documentation', 'com.github.javaparser:javaparser-core')
    add('documentation', "org.apache.groovy:groovy:${bomDependencyVersions['groovy.version']}")
    add('documentation', "org.apache.groovy:groovy-groovydoc:${bomDependencyVersions['groovy.version']}")
    add('documentation', "org.apache.groovy:groovy-ant:${bomDependencyVersions['groovy.version']}")
    add('documentation', "org.apache.groovy:groovy-docgenerator:${bomDependencyVersions['groovy.version']}")
    add('documentation', "org.apache.groovy:groovy-templates:${bomDependencyVersions['groovy.version']}")
}

ext {
    includeInApiDocs = true
}

// Resolve a Groovydoc task property that may be either a Gradle Property<T> or a plain value.
Object resolveGroovydocProperty(Object value) {
    if (value instanceof org.gradle.api.provider.Provider) {
        return value.getOrNull()
    }
    return value
}

// Compute the javaVersion string for groovydoc's JavaParser language level.
// Requires Groovy 4.0.27+ (GROOVY-11668).
String groovydocJavaVersion = "JAVA_${project.findProperty('javaVersion') ?: '17'}"

TaskProvider<Groovydoc> groovydocTask = tasks.named('groovydoc', Groovydoc)
groovydocTask.configure { Groovydoc it ->
    it.classpath = configurations.documentation
    it.groovyClasspath = configurations.documentation
    it.access = GroovydocAccess.PROTECTED
    it.includeAuthor = false
    it.includeMainForScripts = false
    it.processScripts = false
    it.noTimestamp = true
    it.noVersionStamp = false
    it.footer = '''<!-- Matomo -->
<script>
    var _paq = window._paq = window._paq || [];
    /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
    _paq.push(["setDoNotTrack", true]);
    _paq.push(["disableCookies"]);
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
    (function() {
        var u="https://analytics.apache.org/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '79']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
    })();
</script>
<!-- End Matomo Code -->'''
    it.destinationDir = project.file('build/docs/api')

    // Replace Gradle's built-in Groovydoc execution with AntBuilder to support javaVersion.
    // See: https://github.com/apache/grails-core/issues/15385
    it.actions.clear()
    it.doLast {
        def destDir = it.destinationDir
        destDir.mkdirs()

        SourceSetContainer sourceSets = project.extensions.getByType(SourceSetContainer)
        List<File> sourceDirs = ([] + sourceSets.main.groovy.srcDirs + sourceSets.main.java.srcDirs)
                .findAll { File f -> f.exists() }
                .unique()

        if (sourceDirs.isEmpty()) {
            logger.lifecycle("Skipping groovydoc for ${it.name}: no source directories found")
            return
        }

        ant.taskdef(
                name: 'groovydoc',
                classname: 'org.codehaus.groovy.ant.Groovydoc',
                classpath: configurations.documentation.asPath
        )

        def sourcepath = sourceDirs.collect { File f -> f.absolutePath }.join(File.pathSeparator)

        ant.groovydoc(
                destdir: destDir.absolutePath,
                sourcepath: sourcepath,
                packagenames: '**.*',
                windowtitle: it.windowTitle ?: '',
                doctitle: it.docTitle ?: '',
                footer: it.footer ?: '',
                access: resolveGroovydocProperty(it.access)?.name()?.toLowerCase() ?: 'protected',
                author: resolveGroovydocProperty(it.includeAuthor) as String,
                noTimestamp: resolveGroovydocProperty(it.noTimestamp) as String,
                noVersionStamp: resolveGroovydocProperty(it.noVersionStamp) as String,
                processScripts: resolveGroovydocProperty(it.processScripts) as String,
                includeMainForScripts: resolveGroovydocProperty(it.includeMainForScripts) as String,
                javaVersion: groovydocJavaVersion
        )
    }
}

tasks.named('javadoc').configure {
    it.enabled = false
}

tasks.named('javadocJar', Jar).configure { Jar jar ->
    jar.reproducibleFileOrder = true
    jar.preserveFileTimestamps = false
    // to avoid platform specific defaults, set the permissions consistently
    jar.filePermissions { permissions ->
        permissions.unix(0644)
    }
    jar.dirPermissions { permissions ->
        permissions.unix(0755)
    }

    jar.dependsOn(groovydocTask)

    // Ensure the java source set is included in the groovydoc source set
    SourceSetContainer sourceSets = project.extensions.getByType(SourceSetContainer)
    groovydocTask.get().source(project.files(sourceSets.main.java.srcDirs))

    ConfigurableFileCollection groovyDocFiles = project.files(groovydocTask.get().destinationDir)
    jar.from(groovyDocFiles)
    jar.inputs.files(groovyDocFiles)
}

