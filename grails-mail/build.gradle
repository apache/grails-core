plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
    id 'org.apache.grails.gradle.grails-code-style'
    id 'org.apache.grails.gradle.grails-plugin'
    id 'org.apache.grails.gradle.grails-gsp'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'Grails Mail Plugin'
    pomDescription = 'Provides mail support for Grails applications'
}

dependencies {

    implementation platform(project(':grails-bom'))

    compileOnlyApi 'jakarta.mail:jakarta.mail-api', {
        // api: Message, Session
        // impl: MimeMessage, MimeUtility
    }

    implementation 'org.eclipse.angus:jakarta.mail', {
        // impl: SMTPMessage (version managed by the BOM)
    }
    implementation project(':grails-gsp-core'), {
        // impl: GroovyPagesTemplateEngine, GroovyPageTemplate
    }

    compileOnly project(':grails-core'), { // Provided as this is a Grails plugin
        // api: GrailsApplication, Plugin, GrailsPluginManager, @Artefact, @Enhances
        // impl: Config
    }
    compileOnly project(':grails-web-common'), {
        // impl: GrailsWebRequest, WrappedResponseHolder
    }
    compileOnly project(':grails-web-url-mappings'), {
        // impl: LinkGenerator
    }
    compileOnly project(':grails-web-gsp-taglib'), {
        // comp: TagLib artefact (PlainTextMailTagLib), GroovyPagesUriService
    }
    compileOnly 'jakarta.servlet:jakarta.servlet-api' // Cookie, HttpServletRequest, HttpServletResponse
    compileOnly 'jakarta.inject:jakarta.inject-api' // @Inject
    compileOnly 'org.springframework:spring-beans' // @Autowired, @Qualifier, DisposableBean, InitializingBean
    compileOnly 'org.springframework:spring-context' // ApplicationContext, @Bean
    compileOnly 'org.springframework.boot:spring-boot' // Bindable, Binder, ConfigurationPropertySources
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure' // @AutoConfiguration, @ConditionalOnProperty, @ConfigurationProperties
    compileOnly 'org.apache.groovy:groovy' // Provided as this is a Grails plugin
    compileOnly 'org.slf4j:slf4j-api' // @Slf4j

    testImplementation project(':grails-testing-support-web')
    testImplementation 'jakarta.mail:jakarta.mail-api'
    testImplementation 'org.spockframework:spock-core'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}
