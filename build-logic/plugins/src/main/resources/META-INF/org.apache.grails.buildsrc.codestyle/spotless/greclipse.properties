# Groovy-Eclipse formatter configuration for the Grails codebase.
# Aligned with our CodeNarc rules

# Use spaces, not tabs (matching NoTabCharacter CodeNarc rule and .editorconfig)
org.eclipse.jdt.core.formatter.tabulation.char=space

# 4-space indentation (matching Indentation CodeNarc rule and .editorconfig)
org.eclipse.jdt.core.formatter.tabulation.size=4
org.eclipse.jdt.core.formatter.indentation.size=4

# Do not indent empty lines
org.eclipse.jdt.core.formatter.indent_empty_lines=false

# Multiline indentation (continuation indent for method parameters spanning lines).
# Set to 0 to keep anonymous classes and closures inside method arguments at their
# natural block indentation level rather than adding extra continuation indent.
groovy.formatter.multiline.indentation=0

# List wrapping threshold
groovy.formatter.longListLength=30

# Opening brace on the same line (matching BracesForClass CodeNarc rule)
groovy.formatter.braces.start=same

# Closing brace on the next line
groovy.formatter.braces.end=next

# Remove unnecessary semicolons (matching UnnecessarySemicolon CodeNarc rule)
groovy.formatter.remove.unnecessary.semicolons=true
