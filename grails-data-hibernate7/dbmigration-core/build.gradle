plugins {
    id 'groovy'
    id 'java-library'
    id 'java-test-fixtures'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
    id 'org.apache.grails.gradle.grails-code-style'
    id 'org.apache.grails.gradle.grails-code-analysis'
    id 'org.apache.grails.gradle.grails-jacoco'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'Grails Database Migration Core for Hibernate 7'
    pomDescription = 'Grails Database Migration integrations with Hibernate 7 & Liquibase'
}

configurations {
    enversRuntime.extendsFrom(testImplementation)
}

dependencies {
    implementation platform(project(':grails-hibernate7-bom'))

    implementation("org.liquibase:liquibase-core")
    implementation("org.hibernate.orm:hibernate-core")
    implementation("org.hibernate.models:hibernate-models")
    compileOnly("org.hibernate.orm:hibernate-envers")
    testCompileOnly("org.hibernate.orm:hibernate-envers")

    compileOnly "org.projectlombok:lombok"
    annotationProcessor platform(project(':grails-hibernate7-bom'))
    annotationProcessor 'org.projectlombok:lombok'

    testFixturesApi platform(project(':grails-hibernate7-bom'))
    testFixturesApi("org.hibernate.orm:hibernate-core")
    testFixturesApi("org.hibernate.orm:hibernate-envers")
    testFixturesCompileOnly "org.projectlombok:lombok"
    testFixturesAnnotationProcessor platform(project(':grails-hibernate7-bom'))
    testFixturesAnnotationProcessor 'org.projectlombok:lombok'

    compileOnly 'org.springframework:spring-beans'
    compileOnly 'org.springframework:spring-context'
    compileOnly 'org.springframework:spring-orm'

    testImplementation platform(project(':grails-hibernate7-bom'))
    testCompileOnly "org.projectlombok:lombok"
    testAnnotationProcessor platform(project(':grails-hibernate7-bom'))
    testAnnotationProcessor "org.projectlombok:lombok"

    testImplementation 'com.h2database:h2'
    testImplementation 'org.hsqldb:hsqldb'
    testImplementation('org.liquibase:liquibase-test-harness') {
        exclude group: 'org.liquibase', module: 'liquibase-commercial'
    }
    testImplementation 'org.springframework:spring-test'
    testImplementation 'org.springframework:spring-jdbc'
    testImplementation 'org.springframework:spring-beans'
    testImplementation 'org.springframework:spring-context'
    testImplementation 'org.springframework:spring-orm'
    testImplementation project(':grails-data-hibernate7-core')
    testImplementation project(':grails-data-hibernate7')
    testImplementation 'org.testcontainers:testcontainers'
    testImplementation 'org.testcontainers:testcontainers-postgresql'
    testImplementation 'org.testcontainers:testcontainers-spock'
    testImplementation 'org.postgresql:postgresql'
    enversRuntime("org.hibernate.orm:hibernate-envers")
}

tasks.named('test', Test) {
    classpath += configurations.enversRuntime
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/hibernate7-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
