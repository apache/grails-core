plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.gradle.grails-plugin'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
    id 'org.apache.grails.gradle.grails-code-style'
    id 'org.apache.grails.gradle.grails-jacoco'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    gormApiDocs = true
    pomTitle = 'Grails GORM Hibernate 7 Plugin'
    pomDescription = 'GORM - Grails Data Access Framework - Hibernate 7 Plugin'
}

dependencies {
    // TODO: Clarify and clean up dependencies
    implementation platform(project(':grails-hibernate7-bom'))

    api 'org.springframework.boot:spring-boot'
    api 'org.springframework:spring-orm'
    api 'org.hibernate.orm:hibernate-core'
    implementation 'org.hibernate.tool:hibernate-tools-orm'
    implementation 'org.hibernate.tool:hibernate-tools-utils'
    api project(':grails-datastore-web')
    api project(':grails-datamapping-support')
    api project(':grails-data-hibernate7-spring-orm')
    api project(':grails-data-hibernate7-core'), {
        exclude group:'org.springframework', module:'spring-context'
        exclude group:'org.springframework', module:'spring-core'
        exclude group:'org.springframework', module:'spring-beans'
        exclude group:'org.springframework', module:'spring-tx'
        exclude group:'org.apache.grails', module:'grails-bootstrap'
        exclude group:'org.codehaus.groovy', module:'groovy-all'
        exclude group:'org.apache.grails', module:'grails-core'
        exclude group:'javax.transaction', module:'jta'
    }
    api project(':grails-spring')
    api project(':grails-core')

    compileOnly project(':grails-bootstrap')

    compileOnly 'org.spockframework:spock-core', {
        exclude group: 'junit', module: 'junit-dep'
        exclude group: 'org.codehaus.groovy', module: 'groovy-all'
        exclude group: 'org.hamcrest', module: 'hamcrest-core'
    }

    testImplementation project(':grails-testing-support-datamapping')
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'jakarta.servlet:jakarta.servlet-api'

    testRuntimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.apache.tomcat:tomcat-jdbc'
    testRuntimeOnly 'org.hibernate.orm:hibernate-jcache', {
        // exclude javax variant of hibernate-core 5.6

    }
    testRuntimeOnly "org.jboss.spec.javax.transaction:jboss-transaction-api_1.3_spec:$jbossTransactionApiVersion", {
        // required for hibernate-ehcache to work with javax variant of hibernate-core excluded
    }
    testRuntimeOnly 'org.springframework:spring-aop'
    testRuntimeOnly 'org.springframework:spring-expression'
    testRuntimeOnly 'org.yaml:snakeyaml'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/hibernate7-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
}