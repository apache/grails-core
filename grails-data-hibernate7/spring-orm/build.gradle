// Vendored Spring Framework ORM Hibernate 7 integration classes.
// These classes are moved here to align with the structure of Hibernate 5.

plugins {
    id 'java-library'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
}

version = projectVersion
group = 'org.apache.grails.data'

ext {
    pomTitle = 'Grails GORM ORM Hibernate 7 Support'
    pomDescription = 'Vendored Spring Framework ORM Hibernate 7 integration classes for Grails GORM'
}

dependencies {
    implementation platform(project(':grails-hibernate7-bom'))

    api 'org.slf4j:slf4j-api'
    api 'org.springframework:spring-orm'
    api 'org.springframework:spring-web'
    api 'org.springframework:spring-tx'
    api 'org.springframework:spring-beans'
    api 'org.springframework:spring-context'
    compileOnly 'jakarta.servlet:jakarta.servlet-api'
    api 'org.hibernate.orm:hibernate-core', {
        exclude group: 'commons-logging', module: 'commons-logging'
        exclude group: 'org.slf4j', module: 'slf4j-api'
    }
}

// Javadoc references Spring Framework internals not on our classpath - suppress errors for vendored code
tasks.withType(Javadoc).configureEach {
    options.addStringOption('Xdoclint:none', '-quiet')
    failOnError = false
}
